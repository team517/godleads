<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="op-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="op-gloss" x1="32" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Squircle background -->
  <rect x="2" y="2" width="60" height="60" rx="17" fill="url(#op-bg)"/>
  <rect x="2" y="2" width="60" height="30" rx="17" fill="url(#op-gloss)"/>
  <!-- Pulse / heartbeat wave -->
  <path d="M11 35 H23 L28.5 22 L36 46 L41 35 H53"
        stroke="#ffffff" stroke-width="4.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Leading pulse dot -->
  <circle cx="53" cy="35" r="3.4" fill="#ffffff"/>
</svg>
